<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- warm stone bg, rounded square -->
  <rect width="64" height="64" rx="14" fill="#0c0a09"/>
  <!-- subtle 1px inner ring so the icon reads cleanly on light backdrops -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5"
        fill="none" stroke="#1c1917" stroke-width="1"/>
  <!-- italic lowercase "jc" in lime — pulls from the masthead's italic Cortez -->
  <text x="32" y="46"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'DejaVu Serif', serif"
        font-style="italic"
        font-weight="700"
        font-size="40"
        letter-spacing="-1"
        fill="#a3e635">jc</text>
</svg>
